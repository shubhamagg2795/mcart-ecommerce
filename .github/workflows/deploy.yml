name: MCart Frontend CI/CD Pipeline

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-react-s3
  cancel-in-progress: true

# ─────────────────────────────────────────────
# STAGE 1 — Lint & Test
# ─────────────────────────────────────────────
jobs:
  test:
    name: "Stage 1 — Lint & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

# ─────────────────────────────────────────────
# STAGE 2 — Build
# ─────────────────────────────────────────────
  build:
    name: "Stage 2 — Build"
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        env:
          REACT_APP_PRODUCT_API: ${{ secrets.REACT_APP_PRODUCT_API }}
          REACT_APP_CART_API: ${{ secrets.REACT_APP_CART_API }}
          REACT_APP_ORDER_API: ${{ secrets.REACT_APP_ORDER_API }}
          REACT_APP_PAYMENT_API: ${{ secrets.REACT_APP_PAYMENT_API }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: frontend/build
          retention-days: 1

# ─────────────────────────────────────────────
# STAGE 3 — Security Scan
# ─────────────────────────────────────────────
  security:
    name: "Stage 3 — Security Scan"
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=critical || true

# ─────────────────────────────────────────────
# STAGE 4 — Deploy to S3
# ─────────────────────────────────────────────
  deploy-s3:
    name: "Stage 4 — Deploy to S3"
    runs-on: ubuntu-latest
    needs: [build, security]
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Sync to S3
        run: aws s3 sync build/ s3://mcart-frontend-shubham --delete

# ─────────────────────────────────────────────
# STAGE 5 — Invalidate CloudFront
# ─────────────────────────────────────────────
  invalidate-cdn:
    name: "Stage 5 — Invalidate CloudFront"
    runs-on: ubuntu-latest
    needs: deploy-s3
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1MG1T9QILPD2R \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "========================================"
          echo "  MCart deployed successfully!"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Time   : $(date -u)"
          echo "========================================"
